<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Krishna Yadav</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0a0a0f;
--card:#1a1a26;
--border:#2a2a3d;
--accent:#c8ff57;
--accent2:#57c8ff;
--text:#f0f0f8;
--muted:#6b6b8a;
--radius:18px;
}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:40px 16px;
}

.wrap{
width:100%;
max-width:480px;
}

.header{
display:flex;
flex-direction:column;
align-items:center;
padding-bottom:36px;
}

.avatar{
width:88px;height:88px;
border-radius:50%;
border:3px solid var(--accent);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
margin-bottom:16px;
}

.name{
font-family:'Syne',sans-serif;
font-weight:800;
font-size:28px;
}

.name span{color:var(--accent)}

.bio{
font-size:14px;
color:var(--muted);
margin-top:8px;
text-align:center;
}

.links{
display:flex;
flex-direction:column;
gap:12px;
}

.link{
display:flex;
align-items:center;
gap:16px;
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px 20px;
text-decoration:none;
color:var(--text);
transition:.2s;
}

.link:hover{
transform:translateY(-2px);
border-color:var(--accent);
}

.icon{
width:44px;height:44px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
background:#12121a;
font-size:22px;
border:1px solid var(--border);
}

.info{
flex:1;
}

.title{
font-family:'Syne',sans-serif;
font-weight:700;
font-size:15px;
}

.url{
font-size:12px;
color:var(--muted);
margin-top:2px;
}

.footer{
text-align:center;
margin-top:40px;
font-size:12px;
color:var(--muted);
}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="avatar">🚀</div>
<div class="name">Krishna <span>Yadav</span></div>
<div class="bio">Builder · Developer · Creator</div>
</div>

<div class="links">

<a class="link" href="https://linkroast.vercel.app" target="_blank">
<div class="icon">🔥</div>
<div class="info">
<div class="title">LinkRoast</div>
<div class="url">linkroast.vercel.app</div>
</div>
</a>

<a class="link" href="https://youtube.com/@krishna_x4" target="_blank">
<div class="icon">▶️</div>
<div class="info">
<div class="title">YouTube</div>
<div class="url">@krishna_x4</div>
</div>
</a>

<a class="link" href="https://linkedin.com/in/krishna-yadav-kr812345" target="_blank">
<div class="icon">💼</div>
<div class="info">
<div class="title">LinkedIn</div>
<div class="url">krishna-yadav-kr812345</div>
</div>
</a>

<a class="link" href="https://github.com/kr812345" target="_blank">
<div class="icon">🐙</div>
<div class="info">
<div class="title">GitHub</div>
<div class="url">github.com/kr812345</div>
</div>
</a>

<div class="link" style="cursor:default">
<div class="icon">🌐</div>
<div class="info">
<div class="title">Portfolio</div>
<div class="url">Coming Soon</div>
</div>
</div>

</div>

<div class="footer">
Personal link hub
</div>

</div>

</body>
</html>
