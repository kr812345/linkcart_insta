<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>LinkCart</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>

<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}

:root{
--bg:#0a0a0f;
--surface:#12121a;
--card:#1a1a26;
--border:#2a2a3d;
--accent:#c8ff57;
--accent2:#57c8ff;
--text:#f0f0f8;
--muted:#6b6b8a;
--radius:18px;
}

body{
background:var(--bg);
color:var(--text);
font-family:'DM Sans',sans-serif;
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
padding:24px 16px 60px;
overflow-x:hidden;
}

/* ambient background */
body::before,body::after{
content:'';
position:fixed;
border-radius:50%;
filter:blur(120px);
opacity:.18;
pointer-events:none;
z-index:0;
}

body::before{
width:500px;height:500px;
background:#c8ff57;
top:-150px;left:-150px;
animation:drift1 12s ease-in-out infinite alternate;
}

body::after{
width:400px;height:400px;
background:#57c8ff;
bottom:-100px;right:-100px;
animation:drift2 10s ease-in-out infinite alternate;
}

@keyframes drift1{from{transform:translate(0,0)}to{transform:translate(60px,80px)}}
@keyframes drift2{from{transform:translate(0,0)}to{transform:translate(-50px,-60px)}}

.wrap{
position:relative;
z-index:1;
width:100%;
max-width:480px;
}

/* HEADER */
.header{
display:flex;
flex-direction:column;
align-items:center;
padding:48px 0 36px;
}

.avatar{
width:88px;height:88px;
border-radius:50%;
border:3px solid var(--accent);
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
margin-bottom:16px;
background:var(--card);
}

.name{
font-family:'Syne',sans-serif;
font-weight:800;
font-size:28px;
letter-spacing:-0.02em;
}

.name span{color:var(--accent)}

.bio{
font-size:14px;
color:var(--muted);
margin-top:8px;
text-align:center;
}

/* LINKS */
.links{
display:flex;
flex-direction:column;
gap:12px;
}

.link-card{
display:flex;
align-items:center;
gap:16px;
background:var(--card);
border:1px solid var(--border);
border-radius:var(--radius);
padding:16px 20px;
text-decoration:none;
color:var(--text);
transition:.2s;
position:relative;
overflow:hidden;
}

.link-card::before{
content:'';
position:absolute;
inset:0;
background:linear-gradient(135deg,var(--accent)0%,var(--accent2)100%);
opacity:0;
transition:.2s;
z-index:0;
}

.link-card:hover{
transform:translateY(-2px) scale(1.01);
border-color:var(--accent);
box-shadow:0 8px 32px rgba(200,255,87,.08);
}

.link-card:hover::before{opacity:.06}
.link-card>*{position:relative;z-index:1}

.link-icon{
width:44px;height:44px;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
font-size:22px;
border:1px solid var(--border);
background:var(--surface);
}

.link-info{flex:1}

.link-title{
font-family:'Syne',sans-serif;
font-weight:700;
font-size:15px;
}

.link-url{
font-size:12px;
color:var(--muted);
margin-top:2px;
}

.link-arrow{
font-size:18px;
color:var(--muted);
transition:.2s;
}

.link-card:hover .link-arrow{
color:var(--accent);
transform:translateX(3px);
}

.footer{
text-align:center;
margin-top:40px;
font-size:12px;
color:var(--muted);
}

.footer span{color:var(--accent)}
</style>
</head>

<body>

<div class="wrap">

<div class="header">
<div class="avatar">🚀</div>
<div class="name">Krishna <span>Yadav</span></div>
<div class="bio">Creator · Developer · Dreamer</div>
</div>

<div class="links">

<a class="link-card" href="https://linkroast.vercel.app" target="_blank">
<div class="link-icon">🔥</div>
<div class="link-info">
<div class="link-title">LinkRoast</div>
<div class="link-url">linkroast.vercel.app</div>
</div>
<div class="link-arrow">→</div>
</a>

<a class="link-card" href="https://youtube.com/@krishna_x4" target="_blank">
<div class="link-icon">▶️</div>
<div class="link-info">
<div class="link-title">YouTube</div>
<div class="link-url">@krishna_x4</div>
</div>
<div class="link-arrow">→</div>
</a>

<a class="link-card" href="https://linkedin.com/in/krishna-yadav-kr812345" target="_blank">
<div class="link-icon">💼</div>
<div class="link-info">
<div class="link-title">LinkedIn</div>
<div class="link-url">krishna-yadav-kr812345</div>
</div>
<div class="link-arrow">→</div>
</a>

<a class="link-card" href="https://github.com/kr812345" target="_blank">
<div class="link-icon">🐙</div>
<div class="link-info">
<div class="link-title">GitHub</div>
<div class="link-url">github.com/kr812345</div>
</div>
<div class="link-arrow">→</div>
</a>

<div class="link-card" style="cursor:default">
<div class="link-icon">🌐</div>
<div class="link-info">
<div class="link-title">Portfolio</div>
<div class="link-url">Coming Soon</div>
</div>
</div>

</div>

<div class="footer">
Powered by <span>LinkCart</span> · Your personal link hub
</div>

</div>

</body>
</html>
